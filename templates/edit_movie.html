{% extends "layout.html" %}
{% block content %}
<h1>Muokkaa elokuvaa</h1>
<form method="POST" style="max-width:500px;">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <div class="form-group">
        <label for="name">Nimi *</label>
        <input type="text" id="name" name="name" value="{{ movie.name }}" required>
    </div>
    <div class="form-group">
        <label for="description">Kuvaus</label>
        <textarea id="description" name="description">{{ movie.description or '' }}</textarea>
    </div>
    <div class="form-group">
        <label for="year">Julkaisuvuosi</label>
        <input type="number" id="year" name="year" value="{{ movie.year or '' }}" min="1888" max="2100">
    </div>
    <div class="form-group">
        <label>Genret</label>
        <div class="genre-checkboxes">
            {% for genre in genres %}
                <label>
                    <input type="checkbox" name="genres" value="{{ genre.id }}"
                        {% if genre.id in current_genres %}checked{% endif %}>
                    {{ genre.name }}
                </label>
            {% endfor %}
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Tallenna</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-left:0.5rem;">Peruuta</a>
</form>
{% endblock %}
